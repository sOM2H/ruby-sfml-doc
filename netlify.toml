# Netlify config for the ruby-sfml docs site.
#
# Pure-static deployment — no build step. The HTML in ./public is
# generated **locally** with `./build.sh`, committed, and pushed.
# Netlify just serves the directory as-is.
#
# Why no build: ruby-sfml is a C-extension gem (links libcsfml).
# Netlify's build image has neither libcsfml nor the dev headers,
# so `bundle install` fails at extconf time. Sidestep the whole
# problem by building where the toolchain already lives.

[build]
  command = ""
  publish = "public"

# Long-cache the immutable RDoc-generated assets.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sane defaults for HTML.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "no-referrer-when-downgrade"
